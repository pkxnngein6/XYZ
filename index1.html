<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS PANEL UI</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#1a0033,#3b0066);
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.panel{
    width:320px;
    background:#111;
    border-radius:15px;
    border:2px solid #ff00cc;
    box-shadow:0 0 20px #ff00cc;
    padding:20px;
    color:white;
}

.panel h2{
    margin:0 0 15px 0;
    text-align:center;
    color:#ff4dff;
}

.section{
    margin-bottom:20px;
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px 0;
}

.switch{
    position:relative;
    width:40px;
    height:20px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    cursor:pointer;
    background:#555;
    border-radius:20px;
    width:100%;
    height:100%;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    width:16px;
    height:16px;
    background:white;
    border-radius:50%;
    top:2px;
    left:2px;
    transition:.3s;
}

input:checked + .slider{
    background:#ff00cc;
}

input:checked + .slider:before{
    transform:translateX(20px);
}

input[type=range]{
    width:100%;
}

select{
    width:100%;
    padding:5px;
    background:#222;
    color:white;
    border:1px solid #ff00cc;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="panel">
    <h2>ZEUS PANEL</h2>

    <div class="section">
        <div class="toggle">
            <span>ฟังก์ชัน A</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle">
            <span>ฟังก์ชัน B</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <label>ปรับค่าความไว</label>
        <input type="range" min="0" max="100" value="50">
    </div>

    <div class="section">
        <label>เลือกโหมด</label>
        <select>
            <option>HEAD</option>
            <option>BODY</option>
            <option>LEG</option>
        </select>
    </div>

</div>

</body>
</html>
